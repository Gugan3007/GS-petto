<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Sign in to GS-Petto   your trusted pet marketplace.">
    <title>Sign In   GS-Petto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;900&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/product-ui.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-hero);
            position: relative;
            overflow: hidden;
            padding: 24px;
        }

        .login-page::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(255, 111, 97, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(155, 89, 182, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        .login-paws {
            position: absolute;
            inset: 0;
            opacity: 0.04;
            font-size: 80px;
            display: flex;
            flex-wrap: wrap;
            align-content: center;
            justify-content: center;
            gap: 60px;
            pointer-events: none;
            transform: rotate(-15deg);
        }

        .login-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            background: var(--glass-bg-strong);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 48px 36px;
            box-shadow: var(--shadow-xl);
            animation: popIn 0.6s var(--ease-spring);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo h1 {
            font-size: 28px;
            margin-top: 8px;
        }

        .login-logo p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .social-btns {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid var(--border-strong);
            background: var(--surface);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .social-btn:hover {
            background: var(--bg-warm);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .social-btn:active {
            transform: scale(0.98);
        }

        .social-btn img,
        .social-btn svg {
            width: 20px;
            height: 20px;
        }

        .form-footer-text {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 24px;
        }

        .form-footer-text a {
            color: var(--coral);
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="login-page">
        <div class="login-paws">                   </div>

        <div class="login-card">
            <div class="login-logo">
                <div style="font-size:48px;"></div>
                <h1>Welcome to GS-Petto</h1>
                <p>Sign in to find your perfect companion</p>
            </div>

            <div class="social-btns">
                <button class="social-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                    Continue with Google
                </button>
                <button class="social-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path
                            d="M17.5 12.5c0-2.3 1.9-3.5 2-3.6-1.1-1.6-2.8-1.8-3.4-1.8-1.4-.2-2.8.8-3.5.8s-1.9-.8-3.1-.8C7.7 7.1 6 8.3 5.1 10c-2 3.4-.5 8.4 1.4 11.2.9 1.4 2.1 2.9 3.5 2.8 1.4-.1 1.9-.9 3.6-.9s2.2.9 3.6.8c1.5 0 2.5-1.4 3.4-2.7 1.1-1.6 1.5-3.1 1.5-3.2-.1 0-2.9-1.1-2.6-4.5zM14.8 5.7c.8-.9 1.3-2.2 1.1-3.5-1.1.1-2.4.7-3.2 1.6-.7.8-1.3 2.1-1.1 3.4 1.2.1 2.4-.6 3.2-1.5z"
                            fill="currentColor" />
                    </svg>
                    Continue with Apple
                </button>
            </div>

            <div class="divider">or</div>

            <form onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label class="form-label" for="email">Email address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                </div>
                <div style="text-align:right;margin-bottom:20px;">
                    <a href="#" style="font-size:13px;color:var(--coral);font-weight:500;">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-coral btn-lg btn-full">Sign In</button>
            </form>

            <p class="form-footer-text">
                New to GS-Petto? <a href="#">Create an account</a>
            </p>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/interactions.js"></script>
</body>

</html>
